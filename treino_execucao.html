<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Execução do Treino</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/componentes.css" />
  <link rel="stylesheet" href="css/paginas/treino-execucao.css" />
</head>
<body>
  <main>
    <header class="top">
      <a id="voltarIcon" class="voltar-icon" href="treino_exercicios_menu.html" aria-label="Sair">←</a>
      <div>
        <h1 id="titulo">Carregando…</h1>
      </div>
    </header>

    <div id="stepper" class="stepper" hidden>
      <button id="exercicioAnterior" class="stepper-btn" type="button" aria-label="Exercício anterior">‹</button>
      <span id="progressoTag" class="tag"></span>
      <button id="exercicioProximo" class="stepper-btn" type="button" aria-label="Próximo exercício">›</button>
    </div>

    <p class="hint-sair">Seu progresso fica salvo — pode sair e retomar depois.</p>

    <div id="carregando" class="estado">Carregando treino…</div>
    <div id="erro" class="estado" hidden></div>

    <section id="execucao" class="card-exercicio" hidden>
      <h2 id="exercicioNome"></h2>
      <div id="exercicioGrupos" class="item-grupos"></div>

      <div class="serie-info">
        <span id="serieAtualLabel"></span>
        <span id="alvoRepeticoes"></span>
      </div>

      <div id="isometriaNota" class="item-isometria-nota" hidden>
        Isometria de 20s a 50% da amplitude, nas duas últimas séries.
      </div>

      <div id="serieTimer" class="serie-timer" hidden>
        <span class="serie-timer-label">Em andamento</span>
        <span id="serieTimerValor" class="serie-timer-valor">00:00</span>
      </div>

      <div class="campo-input">
        <label for="cargaInput">Carga (kg) <span class="opcional">— opcional</span></label>
        <input id="cargaInput" type="number" inputmode="decimal" min="0" step="0.5" placeholder="0" />
      </div>

      <div id="repeticoesCampo" class="campo-input">
        <label for="repeticoesInput">Repetições realizadas</label>
        <input id="repeticoesInput" type="number" inputmode="numeric" min="0" step="1" placeholder="0" />
      </div>

      <button id="comecarSerie" class="primary">▶ Começar série</button>
      <button id="concluirSerie" class="primary" hidden>Concluir série</button>

      <button id="usarSubstituto" class="secondary" hidden></button>

      <a id="verVideo" class="link" href="#" target="_blank" rel="noopener" hidden>Ver vídeo do exercício →</a>
    </section>

    <section id="descanso" class="card-exercicio" hidden>
      <h2>Descanso</h2>
      <div id="descansoTempo" class="descanso-tempo">00:00</div>
      <div class="descanso-alvo">
        <span>Mín. <strong id="descansoMin"></strong></span>
        <span>Máx. <strong id="descansoMax"></strong></span>
      </div>
      <p id="descansoProximo" class="descanso-proximo"></p>
      <div id="descansoAjusteCarga" class="ajuste-carga" hidden></div>
      <button id="iniciarSerie" class="primary">Iniciar série</button>
    </section>

    <section id="concluido" hidden>
      <div class="emoji">🎉</div>
      <h2>Treino concluído!</h2>
      <p id="resumoConclusao"></p>
      <a class="iniciar" href="treino_exercicios_menu.html">Voltar ao menu</a>
    </section>
  </main>

  <script type="module" src="js/paginas/treino-execucao.js"></script>
</body>
</html>

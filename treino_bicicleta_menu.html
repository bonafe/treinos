<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Treino de Bicicleta — Escolher treino</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #ffffff;
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.24), transparent 34%),
        linear-gradient(160deg, #020617, #0f172a 50%, #111827);
      display: flex;
      justify-content: center;
      padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
    }

    main {
      width: min(680px, 100%);
      padding-top: 8px;
    }

    .top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 18px;
    }

    .voltar-icon {
      flex-shrink: 0;
      text-decoration: none;
      color: #cbd5e1;
      background: rgba(148, 163, 184, 0.14);
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 14px;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    h1 {
      margin: 0 0 4px;
      font-size: clamp(1.4rem, 6vw, 2rem);
      letter-spacing: -0.03em;
      font-weight: 1000;
    }

    p.subtitle {
      margin: 0;
      color: #94a3b8;
      font-size: clamp(0.95rem, 3.5vw, 1.05rem);
    }

    .grafico-secao {
      background: rgba(15, 23, 42, 0.86);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 24px;
      padding: 18px;
      margin-bottom: 22px;
    }

    .grafico-topo {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .grafico-topo h2 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 950;
      letter-spacing: -0.02em;
    }

    .periodo-botoes {
      display: flex;
      gap: 6px;
    }

    .periodo-btn {
      appearance: none;
      background: rgba(148, 163, 184, 0.12);
      border: 1px solid rgba(148, 163, 184, 0.28);
      color: #cbd5e1;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 0.8rem;
      font-weight: 850;
      cursor: pointer;
    }

    .periodo-btn.active {
      background: #bef264;
      border-color: #bef264;
      color: #06110a;
    }

    #graficoBicicleta {
      width: 100%;
      height: auto;
      display: block;
    }

    .lista {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .treino {
      display: block;
      text-decoration: none;
      color: inherit;
      background: rgba(15, 23, 42, 0.86);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.30);
    }

    .treino:active {
      transform: translateY(1px) scale(0.99);
    }

    .treino h2 {
      margin: 0 0 12px;
      font-size: clamp(1.2rem, 5vw, 1.5rem);
      font-weight: 1000;
      letter-spacing: -0.02em;
      color: #bef264;
    }

    .campos {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px 14px;
    }

    .campo strong {
      display: block;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #94a3b8;
      margin-bottom: 2px;
    }

    .campo span {
      font-size: 1rem;
      font-weight: 800;
    }

    .estado {
      text-align: center;
      color: #94a3b8;
      padding: 30px 10px;
    }

    .estado a {
      color: #bef264;
    }
  </style>
</head>
<body>
  <main>
    <header class="top">
      <a class="voltar-icon" href="index.html" aria-label="Voltar">←</a>
      <div>
        <h1>🚴‍♂️ Treino de Bicicleta</h1>
        <p class="subtitle">Escolha um treino para começar.</p>
      </div>
    </header>

    <section id="graficoSecao" class="grafico-secao" hidden>
      <div class="grafico-topo">
        <h2>Tempo de bicicleta</h2>
        <div class="periodo-botoes" role="group" aria-label="Período do gráfico">
          <button type="button" class="periodo-btn active" data-periodo="7d">7 dias</button>
          <button type="button" class="periodo-btn" data-periodo="30d">30 dias</button>
          <button type="button" class="periodo-btn" data-periodo="meses">Meses</button>
        </div>
      </div>
      <svg id="graficoBicicleta" viewBox="0 0 800 240" preserveAspectRatio="xMidYMid meet"></svg>
    </section>
    <div id="graficoVazio" class="estado" hidden>Nenhum treino de bicicleta registrado ainda.</div>

    <div id="lista" class="lista">
      <div class="estado">Carregando treinos…</div>
    </div>
  </main>

  <script src="d3.v7.min.js"></script>
  <script src="storage.js"></script>
  <script>
    function formatarTempo(segundos) {
      if (segundos % 60 === 0) {
        const min = segundos / 60;
        return `${min} min`;
      }
      return `${segundos}s`;
    }

    function labelIntensidade(intensidade) {
      return intensidade === "maxima" ? "Máxima" : "Leve";
    }

    function cartaoTreino(cfg) {
      const a = document.createElement("a");
      a.className = "treino";
      a.href = `treino_bicicleta.html?cardio=${encodeURIComponent(cfg.id)}`;

      a.innerHTML = `
        <h2>${cfg.nome}</h2>
        <div class="campos">
          <div class="campo"><strong>Séries</strong><span>${cfg.series}</span></div>
          <div class="campo"><strong>Tempo de estímulo</strong><span>${formatarTempo(cfg.tempoEstimuloSegundos)}</span></div>
          <div class="campo"><strong>Recuperação</strong><span>${formatarTempo(cfg.tempoRecuperacaoSegundos)}</span></div>
          <div class="campo"><strong>Intensidade do estímulo</strong><span>${labelIntensidade(cfg.intensidadeEstimulo)}</span></div>
          <div class="campo"><strong>Intensidade da recuperação</strong><span>${labelIntensidade(cfg.intensidadeRecuperacao)}</span></div>
        </div>
      `;
      return a;
    }

    const MESES_ABREV = ["jan", "fev", "mar", "abr", "mai", "jun", "jul", "ago", "set", "out", "nov", "dez"];

    function chaveDataLocal(iso) {
      const d = new Date(iso);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
    }

    function chaveMesLocal(iso) {
      const d = new Date(iso);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
    }

    function formatarDataCurta(data) {
      return `${String(data.getDate()).padStart(2, "0")}/${String(data.getMonth() + 1).padStart(2, "0")}`;
    }

    function formatarMesCurto(data) {
      return `${MESES_ABREV[data.getMonth()]}/${String(data.getFullYear()).slice(2)}`;
    }

    function formatarMinutos(minutos) {
      const totalMin = Math.round(minutos);
      if (totalMin < 60) return `${totalMin}min`;
      const h = Math.floor(totalMin / 60);
      const m = totalMin % 60;
      return m ? `${h}h${String(m).padStart(2, "0")}` : `${h}h`;
    }

    function agruparPorDia(historico, dias) {
      const porDia = new Map();
      historico.forEach((s) => {
        const chave = chaveDataLocal(s.dataHora);
        porDia.set(chave, (porDia.get(chave) || 0) + s.duracaoSegundos);
      });

      const hoje = new Date();
      hoje.setHours(12, 0, 0, 0);
      const resultado = [];
      for (let i = dias - 1; i >= 0; i--) {
        const data = new Date(hoje);
        data.setDate(data.getDate() - i);
        const chave = chaveDataLocal(data.toISOString());
        resultado.push({ rotulo: formatarDataCurta(data), totalSegundos: porDia.get(chave) || 0 });
      }
      return resultado;
    }

    function agruparPorMes(historico, meses) {
      const porMes = new Map();
      historico.forEach((s) => {
        const chave = chaveMesLocal(s.dataHora);
        porMes.set(chave, (porMes.get(chave) || 0) + s.duracaoSegundos);
      });

      const hoje = new Date();
      const resultado = [];
      for (let i = meses - 1; i >= 0; i--) {
        const data = new Date(hoje.getFullYear(), hoje.getMonth() - i, 1);
        const chave = `${data.getFullYear()}-${String(data.getMonth() + 1).padStart(2, "0")}`;
        resultado.push({ rotulo: formatarMesCurto(data), totalSegundos: porMes.get(chave) || 0 });
      }
      return resultado;
    }

    function montarGraficoBarras(dados) {
      const W = 800;
      const H = 240;
      const margin = { top: 12, right: 12, bottom: 26, left: 42 };
      const plotW = W - margin.left - margin.right;
      const plotH = H - margin.top - margin.bottom;

      const x = d3.scaleBand()
        .domain(dados.map((d) => d.rotulo))
        .range([0, plotW])
        .padding(dados.length > 15 ? 0.3 : 0.45);

      const maxMin = d3.max(dados, (d) => d.totalSegundos / 60) || 1;
      const y = d3.scaleLinear()
        .domain([0, maxMin * 1.15])
        .range([plotH, 0]);

      const svg = d3.select("#graficoBicicleta");
      svg.selectAll("*").remove();

      const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

      g.append("g")
        .call(d3.axisLeft(y).ticks(4).tickSize(-plotW).tickFormat(""))
        .call((sel) => sel.select(".domain").remove())
        .call((sel) => sel.selectAll("line").attr("stroke", "rgba(148,163,184,0.16)"));

      g.append("g")
        .call(d3.axisLeft(y).ticks(4).tickFormat((v) => formatarMinutos(v)))
        .call((sel) => sel.selectAll("text").attr("fill", "#94a3b8").attr("font-size", "11px"))
        .call((sel) => sel.selectAll("line,.domain").attr("stroke", "rgba(148,163,184,0.3)"));

      const passo = Math.max(1, Math.ceil(dados.length / 8));
      const ticksEixoX = x.domain().filter((_, i) => i % passo === 0);

      g.append("g")
        .attr("transform", `translate(0,${plotH})`)
        .call(d3.axisBottom(x).tickValues(ticksEixoX))
        .call((sel) => sel.selectAll("text").attr("fill", "#94a3b8").attr("font-size", "11px"))
        .call((sel) => sel.selectAll("line,.domain").attr("stroke", "rgba(148,163,184,0.3)"));

      const alturaBarra = (d) => Math.max(2, plotH - y(d.totalSegundos / 60));
      const topoBarra = (d) => plotH - alturaBarra(d);

      g.selectAll("rect.barra")
        .data(dados)
        .join("rect")
        .attr("class", "barra")
        .attr("x", (d) => x(d.rotulo))
        .attr("width", x.bandwidth())
        .attr("y", topoBarra)
        .attr("height", alturaBarra)
        .attr("rx", 3)
        .attr("fill", "#bef264")
        .append("title")
        .text((d) => `${d.rotulo} · ${d.totalSegundos > 0 ? formatarMinutos(d.totalSegundos / 60) : "sem treino"}`);

      // Rótulo direto só cabe com banda larga o bastante (poucos dias/meses);
      // em 30 dias as barras ficam finas demais e o valor vira tooltip só.
      if (x.bandwidth() >= 20) {
        g.selectAll("text.valor-barra")
          .data(dados.filter((d) => d.totalSegundos > 0))
          .join("text")
          .attr("class", "valor-barra")
          .attr("x", (d) => x(d.rotulo) + x.bandwidth() / 2)
          .attr("y", (d) => topoBarra(d) - 6)
          .attr("text-anchor", "middle")
          .attr("fill", "#e2e8f0")
          .attr("font-size", "10px")
          .attr("font-weight", "700")
          .text((d) => formatarMinutos(d.totalSegundos / 60));
      }
    }

    function renderizarGrafico(periodo, historico) {
      if (periodo === "7d") montarGraficoBarras(agruparPorDia(historico, 7));
      else if (periodo === "30d") montarGraficoBarras(agruparPorDia(historico, 30));
      else montarGraficoBarras(agruparPorMes(historico, 6));
    }

    function iniciarGraficoHistorico() {
      const historico = TreinosStorage.lerJSON(TreinosStorage.chaves.historicoSessaoBicicleta, []);
      const secaoEl = document.getElementById("graficoSecao");
      const vazioEl = document.getElementById("graficoVazio");

      if (!historico.length) {
        vazioEl.hidden = false;
        return;
      }

      secaoEl.hidden = false;
      let periodoAtual = "7d";
      renderizarGrafico(periodoAtual, historico);

      secaoEl.querySelectorAll(".periodo-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          if (btn.dataset.periodo === periodoAtual) return;
          periodoAtual = btn.dataset.periodo;
          secaoEl.querySelectorAll(".periodo-btn").forEach((b) => b.classList.toggle("active", b === btn));
          renderizarGrafico(periodoAtual, historico);
        });
      });
    }

    function extrairConfigBicicleta(cardioId, cardio) {
      return {
        id: cardioId,
        nome: cardio.nome,
        series: cardio.series,
        tempoEstimuloSegundos: cardio.tempoEstimulo.segundos,
        tempoRecuperacaoSegundos: cardio.recuperacao.segundos,
        intensidadeEstimulo: cardio.intensidadeEstimulo,
        intensidadeRecuperacao: cardio.intensidadeRecuperacao
      };
    }

    async function carregarTreinos() {
      const listaEl = document.getElementById("lista");

      try {
        const dados = await TreinosStorage.carregarDadosTreinos();
        const configs = Object.entries(dados.cardios)
          .filter(([, cardio]) => cardio.exercicio === "Bicicleta")
          .map(([cardioId, cardio]) => extrairConfigBicicleta(cardioId, cardio));

        listaEl.innerHTML = "";
        if (!configs.length) {
          listaEl.innerHTML = '<div class="estado">Nenhum treino de bicicleta cadastrado ainda.</div>';
          return;
        }
        configs.forEach((cfg) => listaEl.appendChild(cartaoTreino(cfg)));
      } catch (erro) {
        listaEl.innerHTML =
          '<div class="estado">Nenhum dado de treino carregado ainda neste navegador. <a href="importar_dados.html">Carregue o arquivo dados_treinos.json</a> pra começar.</div>';
      }
    }

    iniciarGraficoHistorico();
    carregarTreinos();
  </script>
</body>
</html>

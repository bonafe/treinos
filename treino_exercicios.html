<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Treino de Exercícios</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/componentes.css" />
  <link rel="stylesheet" href="css/paginas/treino-exercicios.css" />
</head>
<body>
  <main>
    <header class="top">
      <a class="voltar-icon" href="treino_exercicios_menu.html" aria-label="Voltar">←</a>
      <div>
        <h1 id="titulo">Carregando…</h1>
        <span id="tipoTag" class="tag" hidden></span>
      </div>
    </header>

    <a id="iniciarTreino" class="iniciar" href="#" hidden>Iniciar treino →</a>

    <details id="guiaDetails" class="guia" hidden>
      <summary>Guia rápido</summary>
      <ul id="guiaLista"></ul>
    </details>

    <section id="aquecimento" class="secao" hidden>
      <h2>Aquecimento</h2>
      <p id="aquecimentoTexto"></p>
      <a id="aquecimentoVideo" href="#" target="_blank" rel="noopener">Ver vídeo de mobilidade →</a>
    </section>

    <div id="blocos"></div>

    <section id="cardio" class="secao" hidden>
      <h2>Cardio complementar</h2>
      <div id="cardioCampos" class="campos"></div>
      <a id="cardioLink" class="iniciar" href="#" style="margin-top: 14px;">Fazer bicicleta →</a>
    </section>

    <div id="vazio" class="estado" hidden>Nenhum exercício cadastrado ainda para este treino.</div>

    <div id="carregando" class="estado">Carregando treino…</div>

    <div id="erro" class="estado" hidden></div>
  </main>

  <script type="module" src="js/paginas/treino-exercicios.js"></script>
</body>
</html>

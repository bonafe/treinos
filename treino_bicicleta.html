<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Treino de Bicicleta</title>
  <style>
    :root {
      /* Trio RGB (não hex) pra poder compor rgba() dinâmico — cada fase só
         troca esse valor; o resto do visual (base escura, cards, botões)
         é o mesmo do restante do site. */
      --accent-rgb: 148, 163, 184;
      --texto: #ffffff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--texto);
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: stretch;
      justify-content: center;
      /* Mesma base escura do resto do site (index.html, menus...); só o
         glow no topo muda de cor pra indicar a fase, em vez de tomar a
         tela toda com uma cor sólida. */
      background:
        radial-gradient(circle at top, rgba(var(--accent-rgb), 0.34), transparent 40%),
        linear-gradient(160deg, #020617, #0f172a 50%, #111827);
      transition: background 0.25s ease, filter 0.18s ease;
    }

    body.leve {
      --accent-rgb: 56, 189, 248; /* azul: recuperação/leve */
    }

    body.maxima {
      --accent-rgb: 251, 113, 133; /* vermelho: intensidade máxima */
    }

    body.fim {
      --accent-rgb: 190, 242, 100; /* verde-lima — mesmo acento usado no resto do site */
    }

    body.carregando,
    body.erro {
      background: linear-gradient(160deg, #020617, #0f172a 50%, #111827);
    }

    .screen {
      width: min(760px, 100%);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
    }

    .top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .voltar-icon {
      flex-shrink: 0;
      text-decoration: none;
      color: #cbd5e1;
      background: rgba(148, 163, 184, 0.14);
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 14px;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    h1 {
      flex: 1;
      min-width: 0;
      margin: 0;
      font-size: clamp(1.15rem, 4vw, 1.6rem);
      letter-spacing: -0.03em;
      opacity: 0.94;
    }

    .badge {
      background: rgba(148, 163, 184, 0.16);
      border: 1px solid rgba(148, 163, 184, 0.3);
      color: #cbd5e1;
      border-radius: 999px;
      padding: 9px 12px;
      font-weight: 900;
      font-size: 0.95rem;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      gap: 16px;
    }

    .phase {
      font-size: clamp(4.3rem, 26vw, 11rem);
      line-height: 0.88;
      font-weight: 1000;
      letter-spacing: -0.10em;
      text-transform: uppercase;
      color: rgb(var(--accent-rgb));
      text-shadow: 0 0 32px rgba(var(--accent-rgb), 0.45);
      margin: 0;
      transition: color 0.25s ease;
    }

    .instruction {
      width: fit-content;
      max-width: 100%;
      margin: 0 auto;
      padding: 14px 20px;
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.86);
      border: 1px solid rgba(var(--accent-rgb), 0.4);
      font-size: clamp(1.15rem, 5vw, 2rem);
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      box-shadow: 0 16px 50px rgba(0,0,0,0.22);
    }

    .phase-time {
      font-variant-numeric: tabular-nums;
      font-size: clamp(5.5rem, 30vw, 12rem);
      line-height: 0.9;
      font-weight: 1000;
      letter-spacing: -0.08em;
      text-shadow: 0 12px 38px rgba(0,0,0,0.34);
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .card {
      background: rgba(15, 23, 42, 0.86);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 22px;
      padding: 14px 12px;
      text-align: center;
    }

    .card strong {
      display: block;
      font-size: 0.86rem;
      opacity: 0.90;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .card span {
      display: block;
      font-variant-numeric: tabular-nums;
      font-size: clamp(1.65rem, 7vw, 2.4rem);
      font-weight: 1000;
    }

    .progress-wrap {
      height: 18px;
      background: rgba(148, 163, 184, 0.14);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.28);
      margin-top: 8px;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: rgb(var(--accent-rgb));
      border-radius: 999px;
      transition: width 0.2s linear, background 0.25s ease;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1.35fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    button, .link-button {
      appearance: none;
      border: 1px solid rgba(148, 163, 184, 0.28);
      background: rgba(148, 163, 184, 0.12);
      color: #cbd5e1;
      border-radius: 18px;
      padding: 17px 12px;
      font-size: 1.03rem;
      font-weight: 950;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      text-decoration: none;
      text-align: center;
      display: inline-block;
    }

    button.primary {
      background: #bef264;
      color: #06110a;
      border-color: #bef264;
      font-size: 1.16rem;
      box-shadow: 0 16px 42px rgba(190, 242, 100, 0.22);
    }

    button:active, .link-button:active {
      transform: translateY(1px) scale(0.99);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .hint {
      margin: 12px 4px 0;
      text-align: center;
      color: #94a3b8;
      font-size: 0.88rem;
      line-height: 1.35;
    }

    .hint a {
      color: #bef264;
    }

    .flash {
      animation: flash 0.55s ease-in-out 3;
    }

    .pulse-maxima .phase {
      animation: pulseMaxima 0.72s ease-in-out infinite alternate;
    }

    @keyframes flash {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.55); }
    }

    @keyframes pulseMaxima {
      from { transform: scale(1); }
      to { transform: scale(1.035); }
    }

    @media (max-width: 460px) {
      .screen {
        padding-left: 14px;
        padding-right: 14px;
      }

      .top {
        align-items: flex-start;
      }

      .cards {
        grid-template-columns: 1fr;
      }

      .buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="carregando">
  <main class="screen">
    <header class="top">
      <a id="voltarIcon" class="voltar-icon" href="treino_bicicleta_menu.html" aria-label="Voltar">←</a>
      <h1 id="titulo">Treino de Bike</h1>
      <div id="cycle" class="badge">Carregando…</div>
    </header>

    <section class="main" aria-live="polite">
      <div id="phase" class="phase">—</div>
      <div id="instruction" class="instruction">Carregando treino…</div>
      <div id="phaseTime" class="phase-time">00:00</div>

      <div class="cards">
        <div class="card">
          <strong>Total restante</strong>
          <span id="totalTime">00:00</span>
        </div>
        <div class="card">
          <strong>Próxima troca</strong>
          <span id="nextChange">—</span>
        </div>
      </div>

      <div class="progress-wrap" aria-label="Progresso do treino">
        <div id="progress" class="progress"></div>
      </div>

      <div class="buttons">
        <button id="startPause" class="primary" disabled>INICIAR</button>
        <button id="reset" disabled>REINICIAR</button>
      </div>

      <p id="hint" class="hint">
        Carregando dados do treino…
      </p>
    </section>
  </main>

  <script src="storage.js"></script>
  <script>
    const INTENSITY_STYLES = {
      leve: {
        classe: "leve",
        label: "LEVE",
        instructionPrefix: "Recuperação leve",
        som: () => soundLow()
      },
      maxima: {
        classe: "maxima",
        label: "MÁXIMA",
        instructionPrefix: "Intensidade máxima",
        som: () => soundHigh()
      }
    };

    let config = null;
    let CYCLE_SECONDS = 0;
    let TOTAL_SECONDS = 0;

    let elapsed = 0;
    let running = false;
    let intervalId = null;
    let lastPhase = null;
    let audioCtx = null;

    const bodyEl = document.body;
    const voltarIconEl = document.getElementById("voltarIcon");
    const tituloEl = document.getElementById("titulo");
    const phaseEl = document.getElementById("phase");
    const instructionEl = document.getElementById("instruction");
    const phaseTimeEl = document.getElementById("phaseTime");
    const totalTimeEl = document.getElementById("totalTime");
    const cycleEl = document.getElementById("cycle");
    const nextChangeEl = document.getElementById("nextChange");
    const progressEl = document.getElementById("progress");
    const startPauseBtn = document.getElementById("startPause");
    const resetBtn = document.getElementById("reset");
    const hintEl = document.getElementById("hint");

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60).toString().padStart(2, "0");
      const s = Math.floor(seconds % 60).toString().padStart(2, "0");
      return `${m}:${s}`;
    }

    function getAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
      return audioCtx;
    }

    function beep({ frequency = 880, duration = 0.22, type = "sine", volume = 0.45 } = {}) {
      const ctx = getAudioContext();
      const oscillator = ctx.createOscillator();
      const gain = ctx.createGain();

      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, ctx.currentTime);

      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(volume, ctx.currentTime + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);

      oscillator.connect(gain);
      gain.connect(ctx.destination);

      oscillator.start(ctx.currentTime);
      oscillator.stop(ctx.currentTime + duration + 0.04);
    }

    function flashScreen() {
      bodyEl.classList.remove("flash");
      void bodyEl.offsetWidth;
      bodyEl.classList.add("flash");
    }

    function soundHigh() {
      // Três bipes onda quadrada, do grave para o agudo: entrando em MÁXIMA.
      beep({ frequency: 1000, duration: 0.16, type: "square", volume: 0.42 });
      setTimeout(() => beep({ frequency: 1250, duration: 0.16, type: "square", volume: 0.42 }), 190);
      setTimeout(() => beep({ frequency: 1500, duration: 0.28, type: "square", volume: 0.46 }), 380);
      if ("vibrate" in navigator) navigator.vibrate([160, 70, 160, 70, 240]);
      flashScreen();
    }

    function soundLow() {
      // Espelho do soundHigh: mesmo estilo, descendo do agudo para o grave: entrando em LEVE.
      beep({ frequency: 1500, duration: 0.16, type: "square", volume: 0.42 });
      setTimeout(() => beep({ frequency: 1250, duration: 0.16, type: "square", volume: 0.42 }), 190);
      setTimeout(() => beep({ frequency: 1000, duration: 0.28, type: "square", volume: 0.46 }), 380);
      if ("vibrate" in navigator) navigator.vibrate([160, 70, 160, 70, 240]);
      flashScreen();
    }

    function soundDone() {
      beep({ frequency: 700, duration: 0.16, type: "triangle", volume: 0.42 });
      setTimeout(() => beep({ frequency: 950, duration: 0.16, type: "triangle", volume: 0.42 }), 190);
      setTimeout(() => beep({ frequency: 1250, duration: 0.16, type: "triangle", volume: 0.42 }), 380);
      setTimeout(() => beep({ frequency: 1600, duration: 0.45, type: "triangle", volume: 0.48 }), 570);
      if ("vibrate" in navigator) navigator.vibrate([180, 80, 180, 80, 320]);
      flashScreen();
    }

    function currentPhaseInfo() {
      if (elapsed >= TOTAL_SECONDS) {
        return {
          phase: "fim",
          intensidade: null,
          phaseLabel: "FIM",
          instruction: "Treino concluído",
          phaseRemaining: 0,
          next: "-",
          serie: config.series
        };
      }

      const pos = elapsed % CYCLE_SECONDS;
      const serie = Math.floor(elapsed / CYCLE_SECONDS) + 1;

      if (pos < config.tempoRecuperacaoSegundos) {
        const estilo = INTENSITY_STYLES[config.intensidadeRecuperacao];
        return {
          phase: "recuperacao",
          intensidade: config.intensidadeRecuperacao,
          phaseLabel: estilo.label,
          instruction: "Recuperação — " + estilo.instructionPrefix,
          phaseRemaining: config.tempoRecuperacaoSegundos - pos,
          next: INTENSITY_STYLES[config.intensidadeEstimulo].label,
          serie
        };
      }

      const estilo = INTENSITY_STYLES[config.intensidadeEstimulo];
      return {
        phase: "estimulo",
        intensidade: config.intensidadeEstimulo,
        phaseLabel: estilo.label,
        instruction: "Estímulo — " + estilo.instructionPrefix,
        phaseRemaining: CYCLE_SECONDS - pos,
        next: INTENSITY_STYLES[config.intensidadeRecuperacao].label,
        serie
      };
    }

    function render() {
      const info = currentPhaseInfo();
      const totalRemaining = Math.max(0, TOTAL_SECONDS - elapsed);

      bodyEl.classList.toggle("leve", info.intensidade === "leve");
      bodyEl.classList.toggle("maxima", info.intensidade === "maxima");
      bodyEl.classList.toggle("fim", info.phase === "fim");
      bodyEl.classList.toggle("pulse-maxima", info.intensidade === "maxima" && running);

      phaseEl.textContent = info.phaseLabel;
      instructionEl.textContent = info.instruction;
      phaseTimeEl.textContent = formatTime(info.phaseRemaining);
      totalTimeEl.textContent = formatTime(totalRemaining);
      cycleEl.textContent = `Série ${Math.min(info.serie, config.series)} / ${config.series}`;
      nextChangeEl.textContent = info.next;
      progressEl.style.width = `${Math.min(100, (elapsed / TOTAL_SECONDS) * 100)}%`;

      if (info.phase === "fim") {
        phaseTimeEl.textContent = "00:00";
        startPauseBtn.textContent = "CONCLUÍDO";
        startPauseBtn.disabled = true;
      } else {
        startPauseBtn.disabled = false;
        startPauseBtn.textContent = running ? "PAUSAR" : "INICIAR";
      }
    }

    function registrarSessaoConcluida() {
      TreinosStorage.adicionarAoHistorico(TreinosStorage.chaves.historicoSessaoBicicleta, {
        cardioId: config.id,
        cardioNome: config.nome,
        dataHora: new Date().toISOString(),
        duracaoSegundos: TOTAL_SECONDS,
        series: config.series
      });
    }

    function tick() {
      if (!running) return;

      elapsed += 1;

      const info = currentPhaseInfo();

      if (elapsed >= TOTAL_SECONDS) {
        elapsed = TOTAL_SECONDS;
        stopTimer();
        render();
        soundDone();
        registrarSessaoConcluida();
        return;
      }

      if (info.intensidade !== lastPhase) {
        lastPhase = info.intensidade;
        INTENSITY_STYLES[info.intensidade].som();
      }

      render();
    }

    function startTimer() {
      getAudioContext();

      if (elapsed >= TOTAL_SECONDS) return;

      if (!running) {
        const info = currentPhaseInfo();
        lastPhase = info.intensidade;

        if (elapsed === 0) INTENSITY_STYLES[info.intensidade].som();

        running = true;
        intervalId = setInterval(tick, 1000);
        render();
      }
    }

    function stopTimer() {
      running = false;
      if (intervalId) {
        clearInterval(intervalId);
        intervalId = null;
      }
      render();
    }

    function resetTimer() {
      stopTimer();
      elapsed = 0;
      lastPhase = null;
      startPauseBtn.disabled = false;
      render();
    }

    function mostrarErro(mensagem, mostrarLinkImportar) {
      bodyEl.classList.remove("carregando");
      bodyEl.classList.add("erro");
      tituloEl.textContent = "Treino de Bike";
      cycleEl.textContent = "Erro";
      phaseEl.textContent = "😕";
      instructionEl.textContent = mensagem;
      phaseTimeEl.textContent = "";
      hintEl.hidden = !mostrarLinkImportar;
      hintEl.innerHTML = mostrarLinkImportar
        ? 'Se ainda não carregou os dados neste navegador, <a href="importar_dados.html">carregue o arquivo dados_treinos.json</a> primeiro.'
        : '';
    }

    function iniciarComConfig(cfg) {
      config = cfg;
      CYCLE_SECONDS = config.tempoEstimuloSegundos + config.tempoRecuperacaoSegundos;
      TOTAL_SECONDS = config.series * CYCLE_SECONDS;

      bodyEl.classList.remove("carregando");
      tituloEl.textContent = config.nome || "Treino de Bike";
      document.title = `${config.nome || "Treino de Bike"} — Treino de Bicicleta`;

      startPauseBtn.disabled = false;
      resetBtn.disabled = false;

      hintEl.hidden = true;

      render();
    }

    function extrairConfigBicicleta(cardioId, cardio) {
      return {
        id: cardioId,
        nome: cardio.nome,
        series: cardio.series,
        tempoEstimuloSegundos: cardio.tempoEstimulo.segundos,
        tempoRecuperacaoSegundos: cardio.recuperacao.segundos,
        intensidadeEstimulo: cardio.intensidadeEstimulo,
        intensidadeRecuperacao: cardio.intensidadeRecuperacao
      };
    }

    async function carregarTreino() {
      const params = new URLSearchParams(window.location.search);
      const cardioId = params.get("cardio");
      const treinoId = params.get("treino");

      voltarIconEl.href = treinoId
        ? `treino_exercicios.html?treino=${encodeURIComponent(treinoId)}`
        : "treino_bicicleta_menu.html";

      if (!cardioId) {
        mostrarErro("Nenhum treino selecionado.");
        return;
      }

      try {
        const dados = await TreinosStorage.carregarDadosTreinos();
        const cardio = dados.cardios[cardioId];
        if (!cardio) throw new Error("Treino não encontrado");
        iniciarComConfig(extrairConfigBicicleta(cardioId, cardio));
      } catch (erro) {
        mostrarErro("Não foi possível carregar este treino.", true);
      }
    }

    startPauseBtn.addEventListener("click", () => {
      if (running) stopTimer();
      else startTimer();
    });

    resetBtn.addEventListener("click", resetTimer);

    carregarTreino();
  </script>
</body>
</html>

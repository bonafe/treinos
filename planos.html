<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Meus Planos</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/componentes.css" />
  <link rel="stylesheet" href="css/paginas/treino-novo.css" />
  <link rel="stylesheet" href="css/paginas/planos.css" />
</head>
<body>
  <div id="confirmOverlay" class="overlay" hidden>
    <div class="confirm-card">
      <p id="confirmTexto"></p>
      <div class="confirm-botoes">
        <button id="confirmCancelar" class="secondary" type="button">Cancelar</button>
        <button id="confirmOk" class="danger" type="button">Excluir</button>
      </div>
    </div>
  </div>

  <div id="duplicarOverlay" class="overlay" hidden>
    <div class="confirm-card">
      <h2>Duplicar plano</h2>
      <p>Pra qual aluno vai a cópia?</p>
      <div class="campo">
        <label for="duplicarAlunoSelect">Aluno</label>
        <select id="duplicarAlunoSelect"></select>
      </div>
      <div class="campo" id="duplicarNomeNovoCampo">
        <label for="duplicarNomeNovoInput">Nome do novo aluno</label>
        <input type="text" id="duplicarNomeNovoInput" autocomplete="off" />
      </div>
      <div class="confirm-botoes">
        <button id="duplicarCancelar" class="secondary" type="button">Cancelar</button>
        <button id="duplicarConfirmar" class="primary" type="button">Duplicar</button>
      </div>
    </div>
  </div>

  <main>
    <header class="top">
      <a id="voltarLink" class="voltar-icon" href="alunos.html" aria-label="Voltar">←</a>
      <div>
        <h1 id="titulo">Meus Planos</h1>
        <p class="subtitle">Escolha um plano pra entrar, ou crie um novo.</p>
      </div>
      <a id="novoPlanoLink" class="icon-btn" href="plano_novo.html" aria-label="Novo plano">+</a>
    </header>

    <div id="carregando" class="estado">Carregando…</div>

    <div id="erro" class="estado" hidden></div>

    <div id="lista" class="lista" hidden></div>

    <div id="mensagem" class="mensagem" hidden></div>

    <p class="rodape-apoio"><a href="index.html#apoio">❤️ Apoiar o Nosso Treino</a></p>
  </main>

  <script type="module" src="js/paginas/planos.js"></script>
</body>
</html>
